# Optional-dependency add-on for compose.yaml, layered on top rather than merged
# into the default stack so `docker compose up` stays lightweight.
#
# scripts/smoke_test_optional.sh only starts the `mongo` service from this file
# (docker compose -f compose.yaml -f docker/compose.optional.yaml up -d mongo)
# and runs the service directly on the host against it, to avoid rebuilding the
# service image on every run. If you want the fully containerized stack instead
# (e.g. testing locally where builds are cheap), this file also layers onto
# agent_service so the following works standalone:
#
#   docker compose -f compose.yaml -f docker/compose.optional.yaml up --build
#
# Adds a MongoDB checkpointer backend. See scripts/smoke_test_optional.sh for
# an automated pass that exercises it end-to-end (plus AG-UI).
services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent_service:
    environment:
      - DATABASE_TYPE=mongo
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=agent_service
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
