# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  
  init:
    cmds:
      - uv sync --frozen

  
  run:
    dotenv: ['.env']
    cmds:
      - uv run src/run_service.py
  
  # INFO: there will be commands for each new Frontend-Component.
  run-sc:
    dotenv: ['.env']
    cmds:
      - uv run src/theme_selector.py --app Skill_Companion --variant {{ .VARIANT | default "default" }}
      - uv run streamlit run src/apps/skill_companion/app.py

  run-dr:
    dotenv: ['.env']
    cmds:
      - uv run src/theme_selector.py --app DWH_Readiness --variant {{ .VARIANT | default "default" }}
      - uv run streamlit run src/apps/dwh_readiness/app.py

  dev:
    desc: "Run Ruff for code quality and formatting"
    cmds:
      - uv run ruff check . --fix
      - uv run ruff format .

  test:
    desc: "Run full pytest suite"
    dotenv: []
    cmds:
      - uv run pytest

  eval-skill:
    desc: "Run skillcompanion_evaluation with timestamp parameters"
    dotenv: ['.env']
    vars:
      FROM: '{{.FROM | default "2025-10-15T11:00:00Z"}}'
      TO: '{{.TO | default "2025-10-25T13:00:00Z"}}'
      NAME: '{{.NAME | default "skillcompanion_interrupted"}}'
    env:
      FROM_TIMESTAMP: '{{.FROM}}'
      TO_TIMESTAMP: '{{.TO}}'
      AGENT_NAME: '{{.NAME}}'
    cmds:
      - uv run src/langfuse_evaluation/skillcompanion_evaluation.py

  

  
