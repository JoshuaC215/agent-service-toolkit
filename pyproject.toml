[project]
name = "agent-service-toolkit"
version = "0.1.0"
description = "Full toolkit for running an AI agent service built with LangGraph, FastAPI and Streamlit"
readme = "README.md"
authors = [{ name = "Joshua Carroll", email = "carroll.joshk@gmail.com" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Framework :: FastAPI",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

requires-python = ">=3.11, <3.14"

dependencies = [
    "docx2txt ~=0.8",
    "ddgs>=9.14.0",
    "duckduckgo-search>=7.3.0",
    "fastapi ~=0.136.0",
    "grpcio >=1.68.0",
    "httpx ~=0.28.1",
    "jiter ~=0.10.0",
    "langchain-core ~=1.3.0",
    "langchain-community ~=0.4.1",
    "langchain-anthropic ~=1.4.1",
    "langchain-aws ~=1.4.4",
    "langchain-chroma ~=1.1.0",
    "langchain-google-genai ~=4.2.2",
    "langchain-google-vertexai ~=3.2.2",
    "langchain-groq ~=1.1.2",
    "langchain-ollama ~=1.1.0",
    "langchain-openai ~=1.1.14",
    "langfuse ~=4.3.1",
    "langgraph ~=1.1.7",
    "langgraph-checkpoint-mongodb ~=0.3.1",
    "langgraph-checkpoint-postgres ~=3.0.5",
    "langgraph-checkpoint-sqlite ~=3.0.3",
    "langgraph-supervisor ~=0.0.31",
    "langsmith ~=0.7.32",
    "numexpr ~=2.10.1",
    "numpy ~=1.26.4; python_version <= '3.12'",
    "numpy ~=2.2.3; python_version >= '3.13'",
    "onnxruntime ~= 1.21.1",
    "pandas ~=2.2.3",
    "psycopg[binary,pool] ~=3.2.4",
    "pyarrow >=18.1.0",
    "pydantic ~=2.13.2",
    "pydantic-settings ~=2.13.1",
    "pypdf ~=5.3.0",
    "pyowm ~=3.3.0",
    "python-dotenv ~=1.0.1",
    "setuptools ~=75.6.0",
    "streamlit ~=1.56.0",
    "tiktoken >=0.8.0",
    "uvicorn ~=0.32.1",
    "matplotlib>=3.10.5",
    "json-repair>=0.53.0",
]

[dependency-groups]
dev = [
    "langgraph-cli[inmem]",
    "pre-commit",
    "pytest",
    "pytest-cov",
    "pytest-env",
    "pytest-asyncio",
    "ruff",
    "mypy",
    "bandit>=1.8.6",
]

# Group for the minimal dependencies to run just the client and Streamlit app.
# These are also installed in the default dependencies.
# To install run: `uv sync --frozen --only-group client`
client = [
    "httpx~=0.28.1",
    "pydantic ~=2.13.2",
    "python-dotenv ~=1.0.1",
    "streamlit~=1.56.0",
    "matplotlib>=3.10.5",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
extend-select = ["I", "U"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_default_fixture_loop_scope = "function"

[tool.pytest_env]
OPENAI_API_KEY = "sk-fake-openai-key"

[tool.mypy]
plugins = "pydantic.mypy"
# Exclude Streamlit main file and archived examples from type checking
exclude = "(^src/streamlit_app.py$)|(^src/archive/)"
# Treat missing external stubs as Any to avoid blocking on optional deps
ignore_missing_imports = true
# Ensure modules under "src" are resolved as packages consistently
explicit_package_bases = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["numexpr.*"]
follow_untyped_imports = true
